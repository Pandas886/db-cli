name: Build DBCLI Binaries

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macos-arm64
            archive_name: dbcli-macos-arm64
            ext: tar.gz
          - os: macos-15-intel
            label: macos-x64
            archive_name: dbcli-macos-x64
            ext: tar.gz
          - os: ubuntu-24.04
            label: linux-x64
            archive_name: dbcli-linux-x64
            ext: tar.gz
          - os: windows-2022
            label: windows-x64
            archive_name: dbcli-windows-x64
            ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build jar and dependencies
        run: mvn -B -DskipTests package

      - name: Create runtime image
        run: |
          jlink \
            --add-modules java.base,java.sql,java.logging,java.desktop,java.management,java.naming,java.security.sasl,jdk.unsupported \
            --strip-debug \
            --no-header-files \
            --no-man-pages \
            --output target/runtime
        shell: bash

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          PKG_DIR="target/package/${{ matrix.archive_name }}"
          mkdir -p "$PKG_DIR/bin" "$PKG_DIR/app"

          cp target/db-cli-0.1.0.jar "$PKG_DIR/app/"
          cp -R target/lib "$PKG_DIR/app/"
          cp -R target/runtime "$PKG_DIR/runtime"
          cp README.md "$PKG_DIR/README.md"
          cp examples/datasources.json "$PKG_DIR/datasources.example.json"

          {
            echo '#!/usr/bin/env bash'
            echo 'set -euo pipefail'
            echo 'SELF_DIR="$(cd "$(dirname "$0")" && pwd)"'
            echo 'ROOT_DIR="$(cd "$SELF_DIR/.." && pwd)"'
            echo 'exec "$ROOT_DIR/runtime/bin/java" -cp "$ROOT_DIR/app/db-cli-0.1.0.jar:$ROOT_DIR/app/lib/*" com.example.dbcli.Main "$@"'
          } > "$PKG_DIR/bin/dbcli"

          chmod +x "$PKG_DIR/bin/dbcli"
          tar -czf "target/${{ matrix.archive_name }}.tar.gz" -C target/package "${{ matrix.archive_name }}"
        shell: bash

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        run: |
          $pkgDir = "target\\package\\${{ matrix.archive_name }}"
          New-Item -ItemType Directory -Force -Path "$pkgDir\\bin" | Out-Null
          New-Item -ItemType Directory -Force -Path "$pkgDir\\app" | Out-Null

          Copy-Item "target\\db-cli-0.1.0.jar" "$pkgDir\\app\\"
          Copy-Item "target\\lib" "$pkgDir\\app\\lib" -Recurse
          Copy-Item "target\\runtime" "$pkgDir\\runtime" -Recurse
          Copy-Item "README.md" "$pkgDir\\README.md"
          Copy-Item "examples\\datasources.json" "$pkgDir\\datasources.example.json"

          @'
          @echo off
          setlocal
          set SCRIPT_DIR=%~dp0
          set ROOT_DIR=%SCRIPT_DIR%..
          "%ROOT_DIR%\\runtime\\bin\\java.exe" -cp "%ROOT_DIR%\\app\\db-cli-0.1.0.jar;%ROOT_DIR%\\app\\lib\\*" com.example.dbcli.Main %*
          '@ | Set-Content -Encoding ascii "$pkgDir\\bin\\dbcli.cmd"

          Compress-Archive -Path "$pkgDir" -DestinationPath "target\\${{ matrix.archive_name }}.zip" -Force
        shell: pwsh

      - name: Build skill package
        run: |
          ./scripts/release/build-skill-package.sh \
            "${{ matrix.label }}" \
            "target/${{ matrix.archive_name }}.${{ matrix.ext }}" \
            "${{ matrix.archive_name }}" \
            "$(pwd)/target/db-cli-skill-${{ matrix.label }}.zip"
        shell: bash

      - name: Resolve release tag
        id: release_meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.release_meta.outputs.tag }}"
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "DB CLI $TAG" --notes "Automated multi-platform binaries and skill packages."
          gh release upload "$TAG" \
            "target/${{ matrix.archive_name }}.${{ matrix.ext }}" \
            "target/db-cli-skill-${{ matrix.label }}.zip" \
            --clobber
        shell: bash
